<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>MTG Life Counter</title>
<meta name="theme-color" content="#111111" />
<link rel="manifest" href='data:application/manifest+json,{"name":"MTG Life Counter","short_name":"Life Counter","display":"standalone","background_color":"#111111","theme_color":"#111111","start_url":"."}'>
<style>
:root{
  --p1:#f1e4c8;
  --p2:#e6d3a3;
  --p3:#d8bf8a;
  --p4:#c9a86e;
  --divider:#101115;
  --chip:rgba(0,0,0,.14);
  --chip-border:rgba(255,255,255,.18);
  --shadow:rgba(0,0,0,.22);
  --gain:#1db954;
  --loss:#d73525;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  width:100%;
  height:100%;
  overflow:hidden;
  background:#111;
  font-family:Arial,Helvetica,sans-serif;
  touch-action:manipulation;
}
body{min-height:100dvh}

.app{
  position:fixed;
  inset:0;
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:2px;
  background:var(--divider);
}

.player{
  position:relative;
  overflow:hidden;
  border:0;
  padding:0;
  margin:0;
  width:100%;
  height:100%;
  user-select:none;
  cursor:default;
  isolation:isolate;
  transition:filter .18s ease, box-shadow .18s ease, transform .18s ease;
}
.player::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,rgba(255,255,255,.10),rgba(255,255,255,.02) 35%,rgba(0,0,0,.06));
  pointer-events:none;
  z-index:0;
}
.player::after{
  content:"";
  position:absolute;
  inset:0;
  opacity:0;
  pointer-events:none;
  transition:opacity .18s ease;
  z-index:0;
}
.player.gain-flash::after{
  opacity:1;
  background:radial-gradient(circle at center, rgba(29,185,84,.35), transparent 55%);
}
.player.loss-flash::after{
  opacity:1;
  background:radial-gradient(circle at center, rgba(215,53,37,.35), transparent 55%);
}
.player[data-player="1"]{background:var(--p1)}
.player[data-player="2"]{background:var(--p2)}
.player[data-player="3"]{background:var(--p3)}
.player[data-player="4"]{background:var(--p4)}

.player.warning{box-shadow:inset 0 0 0 7px rgba(255,153,0,.35)}
.player.danger{box-shadow:inset 0 0 0 8px rgba(213,53,37,.42)}
.player.defeated{filter:saturate(.35) brightness(.42)}
.player.active-turn{
  box-shadow:inset 0 0 0 8px rgba(255,255,255,.92), inset 0 0 0 14px rgba(0,0,0,.22);
}
.player.active-turn::after{
  opacity:1;
  background:radial-gradient(circle at center, rgba(255,255,255,.22), transparent 58%);
}
.player.turn-pulse{
  animation:turn-pulse 1.2s ease;
}
.player.turn-pass-out{animation:turn-pass-out .28s ease}
.player.turn-pass-in{animation:turn-pass-in .34s ease}
.player.turn-slide-right{animation:turn-slide-right .32s ease}
.player.turn-slide-left{animation:turn-slide-left .32s ease}
.player.turn-slide-up{animation:turn-slide-up .32s ease}
.player.turn-slide-down{animation:turn-slide-down .32s ease}
@keyframes turn-pass-out{
  0%{box-shadow:inset 0 0 0 8px rgba(255,255,255,.92), inset 0 0 0 14px rgba(0,0,0,.22)}
  100%{box-shadow:inset 0 0 0 0 rgba(255,255,255,0), inset 0 0 0 0 rgba(0,0,0,0)}
}
@keyframes turn-pass-in{
  0%{transform:scale(.985)}
  50%{transform:scale(1.02)}
  100%{transform:scale(1)}
}
@keyframes turn-pulse{
  0%,100%{box-shadow:inset 0 0 0 8px rgba(255,255,255,.92), inset 0 0 0 14px rgba(0,0,0,.22)}
  50%{box-shadow:inset 0 0 0 10px rgba(255,255,255,1), inset 0 0 0 16px rgba(0,0,0,.16)}
}
@keyframes turn-slide-right{0%{transform:translateX(-2%)}100%{transform:translateX(0)}}
@keyframes turn-slide-left{0%{transform:translateX(2%)}100%{transform:translateX(0)}}
@keyframes turn-slide-up{0%{transform:translateY(2%)}100%{transform:translateY(0)}}
@keyframes turn-slide-down{0%{transform:translateY(-2%)}100%{transform:translateY(0)}}

.life{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) rotate(90deg);
  font-size:clamp(4.2rem,19vw,7rem);
  line-height:1;
  font-weight:900;
  letter-spacing:-.08em;
  color:#fff;
  -webkit-text-stroke:4px #000;
  text-shadow:-2px -2px 0 #000,2px -2px 0 #000,-2px 2px 0 #000,2px 2px 0 #000,0 6px 16px rgba(0,0,0,.2);
  z-index:1;
}
.rot-180 .life{transform:translate(-50%,-50%) rotate(270deg)}
.life.bump{animation:bump .18s ease}
.rot-180 .life.bump{animation:bump-rot .18s ease}
@keyframes bump{
  0%{transform:translate(-50%,-50%) rotate(90deg) scale(1)}
  50%{transform:translate(-50%,-50%) rotate(90deg) scale(1.12)}
  100%{transform:translate(-50%,-50%) rotate(90deg) scale(1)}
}
@keyframes bump-rot{
  0%{transform:translate(-50%,-50%) rotate(270deg) scale(1)}
  50%{transform:translate(-50%,-50%) rotate(270deg) scale(1.12)}
  100%{transform:translate(-50%,-50%) rotate(270deg) scale(1)}
}

.life-delta{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%) rotate(90deg);
  font-size:1.1rem;
  font-weight:900;
  color:#111;
  z-index:2;
  opacity:0;
  pointer-events:none;
  text-shadow:0 1px 0 rgba(255,255,255,.35);
}
.rot-180 .life-delta{transform:translate(-50%,-50%) rotate(270deg)}
.life-delta.show{animation:delta-rise .55s ease}
.life-delta.gain{color:var(--gain)}
.life-delta.loss{color:var(--loss)}
@keyframes delta-rise{
  0%{opacity:0; margin-top:0}
  15%{opacity:1}
  100%{opacity:0; margin-top:-24px}
}

.reset-ring{
  position:absolute;
  left:50%;
  top:50%;
  width:86px;
  height:86px;
  transform:translate(-50%,-50%);
  border-radius:999px;
  background:conic-gradient(rgba(255,255,255,.88) var(--progress,0deg), rgba(0,0,0,0) 0deg);
  opacity:0;
  transition:opacity .12s ease;
  z-index:0;
  pointer-events:none;
}
.reset-ring::after{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:999px;
  background:rgba(17,17,17,.12);
}
.reset-ring.active{opacity:.9}

.quick-adjust{
  position:absolute;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  z-index:7;
  opacity:0;
  pointer-events:none;
  transition:opacity .15s ease;
}
.quick-adjust.open{opacity:1;pointer-events:auto}
.quick-adjust button{
  width:64px;
  height:42px;
  border:none;
  border-radius:12px;
  background:rgba(24,24,24,.86);
  color:#fff;
  font-weight:800;
  font-size:1rem;
  box-shadow:0 6px 14px rgba(0,0,0,.22);
}
.rot-180 .quick-adjust{transform:translate(-50%,-50%) rotate(180deg)}

.side-btn{
  position:absolute;
  left:50%;
  transform:translateX(-50%);
  width:clamp(120px,60%,260px);
  height:clamp(64px,14vw,90px);
  border:1px solid var(--chip-border);
  border-radius:18px;
  background:var(--chip);
  color:rgba(0,0,0,.8);
  font-size:clamp(2.2rem,7vw,3rem);
  font-weight:800;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.12),0 6px 14px rgba(0,0,0,.12);
  z-index:2;
  touch-action:manipulation;
}
.side-btn:active{background:rgba(0,0,0,.22)}
.minus{top:12px}
.plus{bottom:12px}
.player[data-player="2"] .minus,
.player[data-player="4"] .minus{bottom:12px;top:auto}
.player[data-player="2"] .plus,
.player[data-player="4"] .plus{top:12px;bottom:auto}
.rot-180 .side-btn{transform:translateX(-50%) rotate(180deg)}
.rot-180 .side-btn:active{transform:translateX(-50%) rotate(180deg) scale(.96)}

.center-hub{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  width:22px;
  height:22px;
  border-radius:999px;
  background:#111;
  border:2px solid #c7ccd6;
  z-index:5;
  display:flex;
  align-items:center;
  justify-content:center;
  box-shadow:0 2px 6px var(--shadow);
  pointer-events:none;
}
.center-hub::after{
  content:"";
  width:7px;
  height:7px;
  border-radius:999px;
  background:#556070;
}

.controls{
  position:fixed;
  left:50%;
  top:0;
  bottom:0;
  transform:translateX(-50%);
  z-index:6;
  display:flex;
  flex-direction:column;
  align-items:stretch;
  justify-content:stretch;
  background:#2f2a20;
  border-left:1px solid #1f1b14;
  border-right:1px solid #1f1b14;
  overflow:hidden;
  box-shadow:none;
}
.control-btn{
  width:48px;
  flex:1 1 0;
  min-height:0;
  border:none;
  border-bottom:1px solid rgba(255,255,255,.25);
  background:transparent;
  color:#fff;
  font-weight:800;
  font-size:.9rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:background .15s, transform .1s;
  writing-mode:vertical-rl;
  text-orientation:mixed;
}
.control-btn:last-child{border-bottom:none}
.control-btn:hover{background:rgba(255,255,255,.08)}
.control-btn:active{transform:scale(.95);background:rgba(255,255,255,.18)}
.control-btn.active-sound{background:rgba(255,255,255,.14)}
.control-btn.timer-btn{font-size:.78rem;letter-spacing:.04em;flex:1.35 1 0}
.control-btn.timer-running{background:rgba(255,255,255,.12)}
.control-btn.first-player-btn{font-size:.72rem;letter-spacing:.03em;flex:1.45 1 0}
.control-btn.pass-turn-btn{font-size:.74rem;letter-spacing:.03em;flex:1.2 1 0}


.result-popup{
  position:fixed;
  left:50%;
  top:50%;
  transform:translate(-50%,-50%);
  background:#000;
  color:#fff;
  padding:20px 28px;
  font-size:2rem;
  font-weight:800;
  border-radius:14px;
  border:2px solid #fff;
  opacity:0;
  pointer-events:none;
  transition:opacity .2s, transform .2s;
  z-index:20;
  text-align:center;
  white-space:pre-line;
}
.result-popup.show{opacity:1;transform:translate(-50%,-50%) scale(1.1)}
.result-popup.rolling{animation:result-roll-pulse .32s linear infinite}
@keyframes result-roll-pulse{
  0%{transform:translate(-50%,-50%) scale(1.02)}
  50%{transform:translate(-50%,-50%) scale(1.08)}
  100%{transform:translate(-50%,-50%) scale(1.02)}
}

@media(min-width:700px){
  .app{max-width:480px;max-height:880px;margin:auto;inset:0}
}
</style>
</head>
<body>
<main class="app" id="app">
  <section class="player" data-player="1">
    <div class="reset-ring"></div>
    <button class="side-btn minus" type="button">−</button>
    <div class="life">40</div>
    <div class="life-delta"></div>
    <div class="quick-adjust">
      <button type="button" data-adjust="5">+5</button>
      <button type="button" data-adjust="10">+10</button>
      <button type="button" data-adjust="-5">−5</button>
      <button type="button" data-adjust="-10">−10</button>
    </div>
    <button class="side-btn plus" type="button">+</button>
  </section>

  <section class="player rot-180" data-player="2">
    <div class="reset-ring"></div>
    <button class="side-btn plus" type="button">+</button>
    <div class="life">40</div>
    <div class="life-delta"></div>
    <div class="quick-adjust">
      <button type="button" data-adjust="5">+5</button>
      <button type="button" data-adjust="10">+10</button>
      <button type="button" data-adjust="-5">−5</button>
      <button type="button" data-adjust="-10">−10</button>
    </div>
    <button class="side-btn minus" type="button">−</button>
  </section>

  <section class="player" data-player="3">
    <div class="reset-ring"></div>
    <button class="side-btn minus" type="button">−</button>
    <div class="life">40</div>
    <div class="life-delta"></div>
    <div class="quick-adjust">
      <button type="button" data-adjust="5">+5</button>
      <button type="button" data-adjust="10">+10</button>
      <button type="button" data-adjust="-5">−5</button>
      <button type="button" data-adjust="-10">−10</button>
    </div>
    <button class="side-btn plus" type="button">+</button>
  </section>

  <section class="player rot-180" data-player="4">
    <div class="reset-ring"></div>
    <button class="side-btn plus" type="button">+</button>
    <div class="life">40</div>
    <div class="life-delta"></div>
    <div class="quick-adjust">
      <button type="button" data-adjust="5">+5</button>
      <button type="button" data-adjust="10">+10</button>
      <button type="button" data-adjust="-5">−5</button>
      <button type="button" data-adjust="-10">−10</button>
    </div>
    <button class="side-btn minus" type="button">−</button>
  </section>
</main>

<div class="center-hub"></div>

<div class="controls">
  <button class="control-btn" id="soundBtn" type="button">🔇</button>
    <button class="control-btn" id="d20" type="button">D20</button>
  <button class="control-btn" id="d12" type="button">D12</button>
  <button class="control-btn" id="d10" type="button">D10</button>
  <button class="control-btn" id="d6" type="button">D6</button>
  <button class="control-btn" id="coin" type="button">🪙</button>
  <button class="control-btn first-player-btn" id="firstBtn" type="button">Starting Player</button>
  <button class="control-btn pass-turn-btn" id="passTurnBtn" type="button">Pass Turn</button>
  <button class="control-btn timer-btn" id="timerBtn" type="button">00:00
T1</button>
  <button class="control-btn" id="resetBtn" type="button">↺</button>
</div>

<div class="result-popup" id="result"></div>

<script>
const STARTING_LIFE = 40;
const TURN_ORDER = [1,2,4,3];
const players = [...document.querySelectorAll('.player')];
const resetBtn = document.getElementById('resetBtn');
const result = document.getElementById('result');
const soundBtn = document.getElementById('soundBtn');
const firstBtn = document.getElementById('firstBtn');
const passTurnBtn = document.getElementById('passTurnBtn');
const timerBtn = document.getElementById('timerBtn');
const activeHoldTimers = new Map();
const activeRepeatIntervals = new Map();
let soundEnabled = false;
let audioCtx = null;
let activeFirstPlayer = null;
let timerSeconds = 0;
let timerInterval = null;
let turnNumber = 1;
let activeTurnPulseInterval = null;
let lastLifeAction = null;
let lastDiceResult = null;
let shakeLocked = false;

function ensureAudio(){
  if(!audioCtx){
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if(Ctx) audioCtx = new Ctx();
  }
}

function beep(freq = 440, duration = 0.05, type = 'sine', gainValue = 0.03){
  if(!soundEnabled) return;
  ensureAudio();
  if(!audioCtx) return;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.value = freq;
  gain.gain.value = gainValue;
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start();
  gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + duration);
  osc.stop(audioCtx.currentTime + duration);
}

function setSoundUI(){
  soundBtn.textContent = soundEnabled ? '🔊' : '🔇';
  soundBtn.classList.toggle('active-sound', soundEnabled);
}

function showResult(text) {
  result.textContent = text;
  result.classList.remove('rolling');
  result.classList.add('show');
  clearTimeout(showResult.timer);
  showResult.timer = setTimeout(() => result.classList.remove('show'), 1400);
}

function animateLife(lifeEl) {
  lifeEl.classList.remove('bump');
  void lifeEl.offsetWidth;
  lifeEl.classList.add('bump');
}

function flashLife(player, delta){
  const cls = delta > 0 ? 'gain-flash' : 'loss-flash';
  player.classList.remove('gain-flash','loss-flash');
  void player.offsetWidth;
  player.classList.add(cls);
  clearTimeout(player._flashTimer);
  player._flashTimer = setTimeout(() => player.classList.remove(cls), 180);
}

function showDelta(player, delta){
  if(!delta) return;
  const el = player.querySelector('.life-delta');
  el.textContent = delta > 0 ? `+${delta}` : `${delta}`;
  el.classList.remove('show','gain','loss');
  void el.offsetWidth;
  el.classList.add('show', delta > 0 ? 'gain' : 'loss');
}

function applyDangerState(player, value) {
  player.classList.remove('warning', 'danger', 'defeated');
  if (value <= 0) {
    player.classList.add('defeated');
  } else if (value <= 5) {
    player.classList.add('danger');
  } else if (value <= 10) {
    player.classList.add('warning');
  }
}

function setLife(player, value, delta = 0) {
  player.dataset.life = String(value);
  const life = player.querySelector('.life');
  life.textContent = String(value);
  animateLife(life);
  applyDangerState(player, value);
  if(delta){
    showDelta(player, delta);
    flashLife(player, delta);
  }
}

function recordLifeUndo(player, previous, next, delta){
  lastLifeAction = {
    player: Number(player.dataset.player),
    previous,
    next,
    delta,
    timestamp: Date.now()
  };
}

function changeLife(player, amount) {
  const current = Number(player.dataset.life || STARTING_LIFE);
  const next = current + amount;
  recordLifeUndo(player, current, next, amount);
  setLife(player, next, amount);
  beep(amount > 0 ? 640 : 280, 0.035, 'square', 0.02);
}

function clearHold(key) {
  clearTimeout(activeHoldTimers.get(key));
  clearInterval(activeRepeatIntervals.get(key));
  activeHoldTimers.delete(key);
  activeRepeatIntervals.delete(key);
}

function startHold(player, amount) {
  const key = `${player.dataset.player}:${amount}`;
  clearHold(key);
  changeLife(player, amount);
  activeHoldTimers.set(
    key,
    setTimeout(() => {
      activeRepeatIntervals.set(key, setInterval(() => changeLife(player, amount), 120));
    }, 280)
  );
}

function animateRoll(finalText, generator, duration = 420, intervalMs = 55){
  result.classList.add('show','rolling');
  result.textContent = generator();
  const start = performance.now();
  const timer = setInterval(() => {
    result.textContent = generator();
    beep(520 + Math.random()*180, 0.018, 'triangle', 0.012);
    if(performance.now() - start >= duration){
      clearInterval(timer);
      result.classList.remove('rolling');
      result.textContent = finalText;
      clearTimeout(showResult.timer);
      showResult.timer = setTimeout(() => result.classList.remove('show'), 1400);
    }
  }, intervalMs);
}

function roll(sides) {
  const value = Math.floor(Math.random() * sides) + 1;
  const previous = lastDiceResult;
  lastDiceResult = `D${sides}: ${value}`;
  const finalText = previous ? `D${sides}: ${value}
Last: ${previous}` : `D${sides}: ${value}`;
  animateRoll(finalText, () => `D${sides}: ${Math.floor(Math.random() * sides) + 1}`);
}

function flipCoin(){
  const final = Math.random() < 0.5 ? 'Heads' : 'Tails';
  animateRoll(final, () => (Math.random() < 0.5 ? 'Heads' : 'Tails'), 520, 80);
}

function getDirectionClass(fromPlayer, toPlayer){
  const key = `${fromPlayer}-${toPlayer}`;
  const map = {
    '1-2':'turn-slide-right',
    '2-4':'turn-slide-down',
    '4-3':'turn-slide-left',
    '3-1':'turn-slide-up'
  };
  return map[key] || 'turn-pass-in';
}

function clearTurnPulseInterval(){
  clearInterval(activeTurnPulseInterval);
  activeTurnPulseInterval = null;
}

function startTurnPulse(){
  clearTurnPulseInterval();
  if(activeFirstPlayer == null) return;
  activeTurnPulseInterval = setInterval(() => {
    const active = players.find(p => Number(p.dataset.player) === activeFirstPlayer);
    if(!active) return;
    active.classList.remove('turn-pulse');
    void active.offsetWidth;
    active.classList.add('turn-pulse');
    setTimeout(() => active.classList.remove('turn-pulse'), 1200);
  }, 4000);
}

function setActiveTurn(playerNumber){
  const previousPlayer = activeFirstPlayer;
  activeFirstPlayer = playerNumber;
  players.forEach((player) => {
    const playerNum = Number(player.dataset.player);
    const isActive = playerNum === playerNumber;
    const wasActive = playerNum === previousPlayer;
    player.classList.toggle('active-turn', isActive);
    player.classList.toggle('gain-flash', isActive);
    player.classList.remove('turn-pass-out','turn-pass-in','turn-slide-right','turn-slide-left','turn-slide-up','turn-slide-down','turn-pulse');
    clearTimeout(player._turnAnimTimer);
    if (wasActive && previousPlayer !== playerNumber) {
      void player.offsetWidth;
      player.classList.add('turn-pass-out');
    }
    if (isActive) {
      void player.offsetWidth;
      const directionClass = previousPlayer ? getDirectionClass(previousPlayer, playerNumber) : 'turn-pass-in';
      player.classList.add('turn-pass-in', directionClass);
      player._turnAnimTimer = setTimeout(() => {
        player.classList.remove('gain-flash','turn-pass-in','turn-pass-out','turn-slide-right','turn-slide-left','turn-slide-up','turn-slide-down');
      }, 900);
    }
  });
  startTurnPulse();
}

function updateTimerButton(){
  const minutes = String(Math.floor(timerSeconds / 60)).padStart(2,'0');
  const seconds = String(timerSeconds % 60).padStart(2,'0');
  timerBtn.textContent = `${minutes}:${seconds}
T${turnNumber}`;
}

function startMatchTimer(resetTurns = true){
  clearInterval(timerInterval);
  timerSeconds = 0;
  if(resetTurns) turnNumber = 1;
  updateTimerButton();
  timerBtn.classList.add('timer-running');
  timerInterval = setInterval(() => {
    timerSeconds += 1;
    updateTimerButton();
  }, 1000);
}

function pauseTimer(){
  if (!timerInterval) return;
  clearInterval(timerInterval);
  timerInterval = null;
  timerBtn.classList.remove('timer-running');
  showResult('Timer Paused');
}

function resetTimer(){
  clearInterval(timerInterval);
  timerInterval = null;
  timerSeconds = 0;
  turnNumber = 1;
  updateTimerButton();
  timerBtn.classList.remove('timer-running');
  showResult('Timer Reset');
}

function cycleStartingPlayer(){
  const randomIndex = Math.floor(Math.random() * TURN_ORDER.length);
  const nextPlayer = TURN_ORDER[randomIndex];
  setActiveTurn(nextPlayer);
  showResult(`P${nextPlayer} Starts`);
  beep(720, 0.06, 'square', 0.025);
  startMatchTimer(true);
}

function passTurn(){
  let nextPlayer;
  if(activeFirstPlayer === null){
    nextPlayer = TURN_ORDER[0];
  } else {
    const idx = TURN_ORDER.indexOf(activeFirstPlayer);
    nextPlayer = TURN_ORDER[(idx + 1) % TURN_ORDER.length];
    if(nextPlayer === TURN_ORDER[0]) turnNumber += 1;
  }
  setActiveTurn(nextPlayer);
  if(!timerInterval){
    timerBtn.classList.add('timer-running');
    timerInterval = setInterval(() => {
      timerSeconds += 1;
      updateTimerButton();
    }, 1000);
  }
  updateTimerButton();
  showResult(`Turn to P${nextPlayer}`);
  beep(560, 0.05, 'triangle', 0.02);
}

function updateOrientation(){
  document.body.dataset.orientation = window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
}

function closeAllQuickAdjust(){
  document.querySelectorAll('.quick-adjust.open').forEach(el => el.classList.remove('open'));
}

players.forEach((player) => {
  setLife(player, STARTING_LIFE);

  const plusBtn = player.querySelector('.plus');
  const minusBtn = player.querySelector('.minus');
  const ring = player.querySelector('.reset-ring');
  const quickAdjust = player.querySelector('.quick-adjust');
  const lifeEl = player.querySelector('.life');

  quickAdjust.querySelectorAll('button').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      changeLife(player, Number(btn.dataset.adjust));
      quickAdjust.classList.remove('open');
    });
  });

  [[plusBtn, 1], [minusBtn, -1]].forEach(([btn, amount]) => {
    btn.addEventListener('pointerdown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      startHold(player, amount);
    });

    ['pointerup', 'pointerleave', 'pointercancel'].forEach((type) => {
      btn.addEventListener(type, () => clearHold(`${player.dataset.player}:${amount}`));
    });
  });

  let pressTimer = null;
  let progressTimer = null;
  let lifeMenuTimer = null;
  let startY = 0;
  let startX = 0;
  let trackingSwipe = false;
  let lastTap = 0;
  let longPressed = false;
  let lifeMenuOpened = false;
  let touchStartData = null;

  function clearPlayerLongPress(){
    clearTimeout(pressTimer);
    clearInterval(progressTimer);
    pressTimer = null;
    progressTimer = null;
    ring.classList.remove('active');
    ring.style.setProperty('--progress','0deg');
  }

  function clearLifeMenuHold(){
    clearTimeout(lifeMenuTimer);
    lifeMenuTimer = null;
  }

  lifeEl.addEventListener('pointerdown', (e) => {
    e.stopPropagation();
    lifeMenuOpened = false;
    clearLifeMenuHold();
    lifeMenuTimer = setTimeout(() => {
      closeAllQuickAdjust();
      quickAdjust.classList.add('open');
      lifeMenuOpened = true;
      beep(520, 0.04, 'triangle', 0.02);
    }, 420);
  });

  ['pointerup','pointerleave','pointercancel'].forEach(type => {
    lifeEl.addEventListener(type, () => {
      clearLifeMenuHold();
    });
  });

  player.addEventListener('touchstart', (e) => {
    if(e.touches.length === 2){
      touchStartData = {
        avgX:(e.touches[0].clientX + e.touches[1].clientX) / 2,
        avgY:(e.touches[0].clientY + e.touches[1].clientY) / 2,
        time:Date.now()
      };
    } else {
      touchStartData = null;
    }
  }, {passive:true});

  player.addEventListener('touchend', (e) => {
    if(!touchStartData || e.changedTouches.length === 0) return;
    const touch = e.changedTouches[0];
    const dy = touch.clientY - touchStartData.avgY;
    const dx = touch.clientX - touchStartData.avgX;
    if(Date.now() - touchStartData.time < 320){
      if(Math.abs(dy) < 24 && Math.abs(dx) < 24){
        changeLife(player, 5);
      } else if(dy > 35 && Math.abs(dy) > Math.abs(dx)){
        changeLife(player, -5);
      }
    }
    touchStartData = null;
  }, {passive:true});

  player.addEventListener('pointerdown', (e) => {
    if (e.target.closest('.side-btn') || e.target.closest('.control-btn') || e.target.closest('.quick-adjust') || e.target === lifeEl) return;
    trackingSwipe = true;
    longPressed = false;
    startY = e.clientY;
    startX = e.clientX;
    ring.classList.add('active');
    ring.style.setProperty('--progress','0deg');
    let progress = 0;
    progressTimer = setInterval(() => {
      progress += 360 / 14;
      ring.style.setProperty('--progress', `${Math.min(progress,360)}deg`);
    }, 50);
    pressTimer = setTimeout(() => {
      longPressed = true;
      setLife(player, STARTING_LIFE);
      showResult('Reset Player');
      beep(180, .08, 'sawtooth', 0.03);
      clearPlayerLongPress();
    }, 700);
  });

  player.addEventListener('pointerup', (e) => {
    if (e.target.closest('.side-btn') || e.target.closest('.control-btn') || e.target.closest('.quick-adjust')) return;
    clearPlayerLongPress();

    if (lifeMenuOpened) {
      lifeMenuOpened = false;
      return;
    }

    if (longPressed) {
      trackingSwipe = false;
      return;
    }

    if (trackingSwipe) {
      const dy = e.clientY - startY;
      const dx = e.clientX - startX;
      trackingSwipe = false;
      if (Math.abs(dy) > 50 && Math.abs(dy) > Math.abs(dx)) {
        changeLife(player, dy < 0 ? 1 : -1);
        return;
      }
      if (Math.abs(dx) < 14 && Math.abs(dy) < 14) {
        const rect = player.getBoundingClientRect();
        const localY = e.clientY - rect.top;
        changeLife(player, localY < rect.height / 2 ? 1 : -1);
        return;
      }
    }

    const now = Date.now();
    if (now - lastTap < 280) {
      setLife(player, STARTING_LIFE);
      showResult('Reset Player');
      beep(180, .08, 'sawtooth', 0.03);
    }
    lastTap = now;
  });

  const cancelPlayerPress = () => {
    clearPlayerLongPress();
    clearLifeMenuHold();
    trackingSwipe = false;
  };

  player.addEventListener('pointerleave', cancelPlayerPress);
  player.addEventListener('pointercancel', cancelPlayerPress);
});

resetBtn.addEventListener('click', () => {
  players.forEach((p) => {
    setLife(p, STARTING_LIFE);
    p.classList.remove('active-turn','turn-pulse');
  });
  activeFirstPlayer = null;
  clearTurnPulseInterval();
  clearInterval(timerInterval);
  timerInterval = null;
  timerSeconds = 0;
  turnNumber = 1;
  updateTimerButton();
  timerBtn.classList.remove('timer-running');
  lastLifeAction = null;
  closeAllQuickAdjust();
  showResult('Reset');
  beep(180, .08, 'sawtooth', 0.03);
});

soundBtn.addEventListener('click', async () => {
  soundEnabled = !soundEnabled;
  if(soundEnabled){
    ensureAudio();
    if(audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
    beep(660, 0.04, 'square', 0.02);
  }
  setSoundUI();
  showResult(soundEnabled ? 'Sound On' : 'Sound Off');
});



document.getElementById('d20').addEventListener('click', () => roll(20));
document.getElementById('d12').addEventListener('click', () => roll(12));
document.getElementById('d10').addEventListener('click', () => roll(10));
document.getElementById('d6').addEventListener('click', () => roll(6));
document.getElementById('coin').addEventListener('click', flipCoin);
firstBtn.addEventListener('click', cycleStartingPlayer);
passTurnBtn.addEventListener('click', passTurn);

timerBtn.addEventListener('click', () => {
  if (timerInterval) pauseTimer();
});

timerBtn.addEventListener('pointerdown', () => {
  clearTimeout(timerBtn._holdTimer);
  timerBtn._holdTimer = setTimeout(() => {
    resetTimer();
    timerBtn._didHold = true;
  }, 650);
});
['pointerup','pointerleave','pointercancel'].forEach(type => {
  timerBtn.addEventListener(type, () => {
    clearTimeout(timerBtn._holdTimer);
    setTimeout(() => { timerBtn._didHold = false; }, 0);
  });
});

document.addEventListener('click', (e) => {
  if(!e.target.closest('.quick-adjust') && !e.target.classList.contains('life')){
    closeAllQuickAdjust();
  }
});

window.addEventListener('devicemotion', (e) => {
  const acc = e.accelerationIncludingGravity;
  if(!acc || shakeLocked) return;
  const magnitude = Math.abs(acc.x || 0) + Math.abs(acc.y || 0) + Math.abs(acc.z || 0);
  if(magnitude > 38){
    shakeLocked = true;
    roll(20);
    setTimeout(() => { shakeLocked = false; }, 1500);
  }
});

updateOrientation();
window.addEventListener('resize', updateOrientation);
window.addEventListener('orientationchange', updateOrientation);
setSoundUI();
updateTimerButton();

if ('serviceWorker' in navigator) {
  const swBlob = new Blob([
    `self.addEventListener('install', e => self.skipWaiting());self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));`
  ], { type: 'text/javascript' });
  const swUrl = URL.createObjectURL(swBlob);
  navigator.serviceWorker.register(swUrl).catch(() => {});
}
</script>
