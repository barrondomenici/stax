<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Mobile Player Counter</title>
  <style>
    :root {
      /* Cabal palette */
      --cream: #d9d3c2;
      --tan: #8a5a37;
      --brown: #6b4423;
      --dark-brown: #3b2414;
      --black: #000000;

      --bg: #000000;
      --bg-2: #000000;
      --card: rgba(59,36,20,0.92);
      --card-border: rgba(217,211,194,0.18);
      --text: #f6f2e7;
      --muted: #c7bda8;

      --shadow: 0 16px 40px rgba(0,0,0,0.45);
      --radius: 24px;
      --button-radius: 18px;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #000000;
      color: var(--text);
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
    }

    body {
      padding: max(14px, env(safe-area-inset-top)) 14px max(18px, env(safe-area-inset-bottom));
    }

    .shell {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      backdrop-filter: blur(12px);
      background: rgba(59,36,20,0.75);
      border: 1px solid var(--card-border);
      border-radius: 22px;
      padding: 14px;
      margin-bottom: 14px;
      box-shadow: var(--shadow);
    }

    .title-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .title-block h1 {
      margin: 0;
      font-size: 1.15rem;
      letter-spacing: 0.02em;
      color: var(--cream);
    }

    .title-block p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 0.88rem;
    }

    .top-actions {
      display: flex;
      gap: 10px;
    }

    .reset-btn,
    .toolbar-btn,
    .player-adjust-btn {
      border: none;
      border-radius: 16px;
      padding: 12px 14px;
      color: var(--cream);
      font-weight: 700;
      font-size: 0.94rem;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .reset-btn {
      background: linear-gradient(180deg, var(--tan), var(--brown));
    }

    .dice-toolbar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 10px;
    }

    .toolbar-btn {
      min-height: 54px;
      padding: 10px 8px;
      border-radius: 16px;
      font-size: 0.95rem;
      font-weight: 800;
      background: linear-gradient(180deg, var(--tan), var(--brown));
    }

    .dice-result {
      min-height: 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .app {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .section {
      position: relative;
      background: var(--card);
      border: 1px solid var(--card-border);
      border-radius: var(--radius);
      padding: 14px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
      touch-action: manipulation;
      overflow: hidden;
    }

    .section.dragging {
      opacity: 0.6;
      transform: scale(0.985);
      border-color: var(--cream);
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }

    .drag-handle {
      display: grid;
      place-items: center;
      width: 42px;
      height: 42px;
      font-size: 1.15rem;
      color: var(--cream);
      user-select: none;
      cursor: grab;
      border-radius: 14px;
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.08);
      flex: 0 0 auto;
      touch-action: none;
    }

    .player-name {
      flex: 1;
      width: 100%;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--cream);
      background: rgba(0,0,0,0.25);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px 14px;
      outline: none;
    }

    .counter-wrap {
      text-align: center;
      margin: 4px 0 14px;
    }

    .counter-label {
      color: var(--muted);
      font-size: 0.8rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .counter {
      font-size: clamp(3.5rem, 12vw, 5rem);
      line-height: 1;
      font-weight: 900;
      letter-spacing: -0.04em;
      color: var(--cream);
      text-shadow: 0 6px 20px rgba(0,0,0,0.5);
      margin: 0;
    }

    .button-row {
      display: flex;
      flex-direction: row;
      gap: 6px;
      justify-content: space-between;
      margin-top: 6px;
    }

    button {
      appearance: none;
      border: none;
      color: var(--cream);
      cursor: pointer;
      transition: transform 0.08s ease, filter 0.18s ease;
    }

    button:active {
      transform: scale(0.97);
    }

    .button-row button {
      flex: 1;
      border-radius: 10px;
      min-height: 34px;
      padding: 4px 0;
      font-size: 0.85rem;
      font-weight: 800;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.1), 0 4px 10px rgba(0,0,0,0.35);
    }

    .minus-5, .minus-1 {
      background: linear-gradient(180deg, var(--dark-brown), var(--black));
    }

    .plus-1, .plus-5 {
      background: linear-gradient(180deg, var(--tan), var(--brown));
    }

    .player-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .player-adjust-btn {
      min-height: 58px;
      font-size: 1rem;
      font-weight: 800;
      border-radius: 18px;
    }

    .player-adjust-btn.add {
      background: linear-gradient(180deg, var(--tan), var(--brown));
    }

    .player-adjust-btn.remove {
      background: linear-gradient(180deg, var(--dark-brown), var(--black));
    }

    .footer-hint {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      padding: 10px 6px 2px;
    }

    @media (min-width: 480px) {
      .button-row {
        grid-template-columns: repeat(4, 1fr);
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="topbar">
      <div class="title-row">
        <div class="title-block">
          <h1>Player Counter</h1>
          <p>Drag to reorder. Tap a name to edit.</p>
        </div>
        <div class="top-actions">
          <button type="button" class="reset-btn" id="resetAll">Reset</button>
        </div>
      </div>

      <div class="dice-toolbar">
        <button type="button" class="toolbar-btn" data-die="6">D6</button>
        <button type="button" class="toolbar-btn" data-die="10">D10</button>
        <button type="button" class="toolbar-btn" data-die="12">D12</button>
        <button type="button" class="toolbar-btn" data-die="20">D20</button>
      </div>
      <div class="dice-result" id="diceResult">Roll a die from the top bar.</div>
    </div>

    <div class="app" id="app">
      <div class="section" draggable="true">
        <div class="section-header">
          <div class="drag-handle" aria-hidden="true">☰</div>
          <input class="player-name" type="text" value="PLAYER 1" aria-label="Player name" />
        </div>
        <div class="counter-wrap">
          <div class="counter-label">Life Total</div>
          <p class="counter">40</p>
        </div>
        <div class="button-row">
          <button type="button" class="minus-5" data-change="-5">-5</button>
          <button type="button" class="minus-1" data-change="-1">-1</button>
          <button type="button" class="plus-1" data-change="1">+1</button>
          <button type="button" class="plus-5" data-change="5">+5</button>
        </div>
      </div>
    </div>

    <div class="player-controls">
      <button type="button" class="player-adjust-btn add" id="addPlayer">+ Add Player</button>
      <button type="button" class="player-adjust-btn remove" id="removePlayer">- Remove Player</button>
    </div>

    <div class="footer-hint">Built for quick mobile use with large buttons and one-thumb friendly spacing.</div>
  </div>

  <template id="playerTemplate">
    <div class="section" draggable="true">
      <div class="section-header">
        <div class="drag-handle" aria-hidden="true">☰</div>
        <input class="player-name" type="text" value="PLAYER" aria-label="Player name" />
      </div>
      <div class="counter-wrap">
        <div class="counter-label">Life Total</div>
        <p class="counter">40</p>
      </div>
      <div class="button-row">
        <button type="button" class="minus-5" data-change="-5">-5</button>
        <button type="button" class="minus-1" data-change="-1">-1</button>
        <button type="button" class="plus-1" data-change="1">+1</button>
        <button type="button" class="plus-5" data-change="5">+5</button>
      </div>
    </div>
  </template>

  <script>
    const app = document.getElementById('app');
    const resetAll = document.getElementById('resetAll');
    const addPlayer = document.getElementById('addPlayer');
    const removePlayer = document.getElementById('removePlayer');
    const diceResult = document.getElementById('diceResult');
    const playerTemplate = document.getElementById('playerTemplate');
    let draggedSection = null;

    function getNextPlayerNumber() {
      const names = [...app.querySelectorAll('.player-name')].map((input) => input.value.trim());
      let highest = 0;

      names.forEach((name) => {
        const match = name.match(/PLAYER\\s+(\\d+)/i);
        if (match) highest = Math.max(highest, Number(match[1]));
      });

      return highest + 1 || app.children.length + 1;
    }

    function wireSection(section) {
      section.addEventListener('dragstart', () => {
        draggedSection = section;
        section.classList.add('dragging');
      });

      section.addEventListener('dragend', () => {
        section.classList.remove('dragging');
        draggedSection = null;
      });

      section.addEventListener('dragover', (event) => {
        event.preventDefault();
        if (!draggedSection || draggedSection === section) return;

        const box = section.getBoundingClientRect();
        const offset = event.clientY - box.top;
        const midpoint = box.height / 2;

        if (offset < midpoint) {
          app.insertBefore(draggedSection, section);
        } else {
          app.insertBefore(draggedSection, section.nextSibling);
        }
      });
    }

    [...app.querySelectorAll('.section')].forEach(wireSection);

    document.querySelectorAll('.drag-handle').forEach((handle) => {
      handle.addEventListener('touchstart', (event) => {
        event.stopPropagation();
      }, { passive: true });
    });

    app.addEventListener('click', (event) => {
      const button = event.target.closest('button[data-change]');
      if (!button) return;

      const section = button.closest('.section');
      const counter = section.querySelector('.counter');
      const change = Number(button.dataset.change);
      const currentValue = Number(counter.textContent);
      counter.textContent = currentValue + change;
    });

    document.querySelector('.dice-toolbar').addEventListener('click', (event) => {
      const dieButton = event.target.closest('[data-die]');
      if (!dieButton) return;

      const sides = Number(dieButton.dataset.die);
      const roll = Math.floor(Math.random() * sides) + 1;
      diceResult.textContent = `D${sides} rolled: ${roll}`;
    });

    resetAll.addEventListener('click', () => {
      app.querySelectorAll('.counter').forEach((counter) => {
        counter.textContent = 40;
      });
      diceResult.textContent = 'All life totals reset to 40.';
    });

    addPlayer.addEventListener('click', () => {
      const fragment = playerTemplate.content.cloneNode(true);
      const newSection = fragment.querySelector('.section');
      newSection.querySelector('.player-name').value = `PLAYER ${getNextPlayerNumber()}`;
      app.appendChild(newSection);
      wireSection(newSection);

      const handle = newSection.querySelector('.drag-handle');
      handle.addEventListener('touchstart', (event) => {
        event.stopPropagation();
      }, { passive: true });

      newSection.querySelector('.player-name').focus();
    });

    removePlayer.addEventListener('click', () => {
      const sections = app.querySelectorAll('.section');
      if (sections.length <= 1) return;
      sections[sections.length - 1].remove();
    });
  </script>
</body>
</html>
