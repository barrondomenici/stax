<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>CABAL WEB COUNTER</title>
<meta name="theme-color" content="#111315" />
<link rel="manifest" href="#" id="manifestLink" />
<style>
:root{
  --bg:#111315;
  --card:#ffffff;
  --card-edge:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;
  --primary:#3b82f6;
  --primary-dark:#2563eb;
  --danger:#111111;
  --warning:#f59e0b;
  --life-bg:#f3f4f6;
  --life-border:#111111;
  --radius:18px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  min-height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
body{padding:12px 12px max(18px,env(safe-area-inset-bottom));}
.shell{max-width:560px;margin:0 auto;}
.topbar{
  position:sticky;
  top:0;
  z-index:10;
  background:#1f2937;
  border:1px solid #374151;
  box-shadow:0 6px 16px rgba(0,0,0,0.35);
  border-radius:14px;
  padding:8px;
  margin-bottom:8px;

  position:sticky;
  top:0;
  z-index:10;
  background:#1f2937;
  border:1px solid #374151;
  box-shadow:0 8px 20px rgba(0,0,0,0.35);
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
}
.title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;gap:6px;}
.header-meta{display:flex;flex-direction:column;gap:6px;min-width:0;}
.status-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;color:#d1d5db;font-size:.78rem;font-weight:700;}
.timer-pill,.turn-pill{display:inline-flex;align-items:center;justify-content:center;padding:2px 6px;border-radius:999px;background:#111827;border:1px solid #374151;min-height:32px;}
.turn-pill{color:#f9fafb;}
.timer-pill{color:#cbd5e1;font-variant-numeric:tabular-nums;}
.header-actions{display:grid;grid-template-columns:repeat(4,auto);gap:6px;align-self:flex-start;}
.preset-select{
  border:none;
  background:#111827;
  color:#fff;
  padding:8px 10px;
  border-radius:10px;
  font-weight:700;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  font-size:.78rem;
  min-width:96px;
}
@media (max-width:520px){
  .title-row{flex-direction:column;align-items:stretch;}
  .header-actions{grid-template-columns:repeat(4,1fr);width:100%;}
  .reset-btn,.first-player-btn,.preset-select{width:100%;text-align:center;}
}
.title-row h1{margin:0;font-size:.95rem;color:#f9fafb;}
.reset-btn,.first-player-btn{
  border:none;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:6px 8px;
  border-radius:10px;
  font-weight:700;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  font-size:.82rem;
}
.first-player-btn{background:linear-gradient(180deg,var(--warning),#d97706);}
.dice-toolbar{display:flex;margin-top:2px;border-radius:10px;overflow:hidden;border:1px solid #1f2937;}
.toolbar-btn{
  flex:1;
  font-size:.72rem;
  border:none;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:6px 0;
  font-weight:700;
  box-shadow:inset 0 1px 0 rgba(255,255,255,0.15);
  border-right:1px solid rgba(0,0,0,0.35);
  transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
}
.toolbar-btn:last-child{border-right:none;}
.toolbar-btn:active{transform:scale(.96);}
.toolbar-btn.rolling{animation:rollPulse .45s ease;}
.dice-result{
  text-align:center;
  margin-top:4px;
  font-size:.85rem;
  font-weight:800;
  letter-spacing:.03em;
  color:#111827;
  background:linear-gradient(180deg,#ffffff,#e5e7eb);
  border:1px solid #d1d5db;
  border-radius:8px;
  padding:4px 6px;
  box-shadow:0 2px 6px rgba(0,0,0,0.25);
  min-height:20px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
}
.dice-result.flashy{
  animation:resultFlash .55s ease;
  box-shadow:0 0 0 2px #fff, 0 0 14px rgba(59,130,246,.9), 0 8px 18px rgba(0,0,0,.35);
  transform:scale(1.06);
}
.app{display:flex;flex-direction:column;gap:8px;}
.section{
  background:var(--card);
  border:1px solid var(--card-edge);
  box-shadow:0 4px 10px rgba(0,0,0,0.15);
  border-radius:var(--radius);
  padding:6px 8px;
  display:flex;
  align-items:center;
  gap:8px;
  min-height:64px;
}
.section:nth-child(4n+1){border-left:4px solid #ef4444;}
.section:nth-child(4n+2){border-left:4px solid #3b82f6;}
.section:nth-child(4n+3){border-left:4px solid #22c55e;}
.section:nth-child(4n+4){border-left:4px solid #f59e0b;}
.section.starting-player{
  outline:3px solid var(--warning);
  box-shadow:0 0 0 4px rgba(245,158,11,.2), 0 10px 18px rgba(0,0,0,0.22);
}
.life{
  font-size:2.1rem;
  font-weight:900;
  min-width:64px;
  text-align:center;
  color:#111827;
  background:var(--life-bg);
  border:2px solid var(--life-border);
  border-radius:12px;
  padding:4px 8px;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
  user-select:none;
  touch-action:pan-y;
  transition:transform .18s ease, background-color .18s ease, box-shadow .18s ease;
}
.life.flash-plus{animation:lifePlus .35s ease;}
.life.flash-minus{animation:lifeMinus .35s ease;}
.life.tap-hint{box-shadow:0 0 0 3px rgba(59,130,246,.2), 0 3px 8px rgba(0,0,0,0.2);}
.player-area{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
.player-name{
  font-size:.58rem;
  font-size:.65rem;
  font-weight:700;
  padding:2px 4px;
  border-radius:6px;
  border:1px solid #d1d5db;
  background:#fff;
  color:#444;
}
.controls{display:flex;gap:4px;}
.controls button{
  flex:1;
  border:1.5px solid #000;
  border-radius:7px;
  padding:7px 0;
  font-size:.78rem;
  font-weight:800;
  color:#fff;
  box-shadow:0 3px 8px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.14);
  transition:transform .12s ease, box-shadow .12s ease;
  flex:1;
  border:1.5px solid #000;
  border-radius:8px;
  padding:10px 0;
  font-size:.9rem;
  font-weight:800;
  color:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.14);
  transition:transform .12s ease, box-shadow .12s ease;
}
.controls button:active{transform:translateY(1px) scale(.98);box-shadow:0 2px 6px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.1);}
.minus{background:var(--danger);}
.plus{background:linear-gradient(180deg,var(--primary),var(--primary-dark));}
.commander-trackers{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.cmd-box{border:1px solid #d1d5db;border-radius:8px;background:#f9fafb;padding:3px;min-width:0;}
.cmd-label{font-size:.52rem;color:var(--muted);text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px;}
.cmd-row{display:flex;align-items:center;gap:2px;}
.cmd-btn{flex:0 0 18px;height:18px;border:1px solid #cbd5e1;border-radius:5px;background:#fff;color:#111827;font-size:.7rem;font-weight:800;padding:0;}
.cmd-value{flex:1;min-width:0;text-align:center;font-size:.72rem;font-weight:800;color:#111827;}
.cmd-box.lethal{background:#fee2e2;border-color:#ef4444;}
.player-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;position:sticky;bottom:0;background:linear-gradient(180deg,rgba(17,19,21,0),rgba(17,19,21,.96) 40%);padding-top:8px;}
.player-controls button{border:none;padding:10px 0;border-radius:12px;font-weight:700;color:#fff;box-shadow:0 6px 14px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.16);}
.add{background:linear-gradient(180deg,var(--primary),var(--primary-dark));}
.remove{background:#374151;}
.install-hint{margin-top:8px;color:#d1d5db;font-size:.72rem;text-align:center;}
#historyFeed{margin-top:12px;background:#1f2937;border:1px solid #374151;border-radius:14px;padding:10px;color:#e5e7eb;}
#historyList{display:flex;flex-direction:column;gap:6px;font-size:.74rem;max-height:220px;overflow:auto;}
@keyframes resultFlash{0%{transform:scale(.85);filter:brightness(1.2)}50%{transform:scale(1.12);filter:brightness(1.6)}100%{transform:scale(1)}}
@keyframes rollPulse{0%{transform:scale(1) rotate(0deg)}20%{transform:scale(.95) rotate(-4deg)}50%{transform:scale(1.06) rotate(4deg)}100%{transform:scale(1) rotate(0deg)}}
@keyframes lifePlus{0%{transform:scale(1);background:#f3f4f6}40%{transform:scale(1.08);background:#dcfce7}100%{transform:scale(1);background:#f3f4f6}}
@keyframes lifeMinus{0%{transform:scale(1);background:#f3f4f6}40%{transform:scale(1.08);background:#fee2e2}100%{transform:scale(1);background:#f3f4f6}}
</style>
</head>
<body>
<div class="shell">
  <div class="topbar">
    <div class="title-row">
      <div class="header-meta">
        
        <div class="status-row">
          <div class="turn-pill" id="turnDisplay">Turn 1</div>
          <div class="timer-pill" id="gameTimer">00:00</div>
          </div>
      </div>
      <div class="header-actions">
        <select class="preset-select" id="presetSelect" aria-label="Game preset">
          <option value="commander" selected>Commander</option>
          <option value="standard">Standard</option>
        </select>
        <button class="first-player-btn" id="endTurnBtn">Turn Rotation</button>
        <button class="first-player-btn" id="pickStarter">First Player</button>
        <button class="reset-btn" id="resetAll">Reset</button>
      </div>
    </div>
    <div class="dice-toolbar">
      <button class="toolbar-btn" data-die="6">D6</button>
      <button class="toolbar-btn" data-die="10">D10</button>
      <button class="toolbar-btn" data-die="12">D12</button>
      <button class="toolbar-btn" data-die="20">D20</button>
      <button class="toolbar-btn" data-flip="coin">Coin</button>
    </div>
    <div class="dice-result" id="diceResult">Roll a die, flip a coin, or pick the starting player</div>
  </div>

  <div class="app" id="app">
    <div class="section">
      <div class="life">40</div>
      <div class="player-area">
        <input class="player-name" placeholder="Player 1" />
        <div class="controls">
          <button class="minus" data-change="-5">-5</button>
          <button class="minus" data-change="-1">-1</button>
          <button class="plus" data-change="1">+1</button>
          <button class="plus" data-change="5">+5</button>
        </div>
        <div class="commander-trackers"></div>
      </div>
    </div>
    <div class="section">
      <div class="life">40</div>
      <div class="player-area">
        <input class="player-name" placeholder="Player 2" />
        <div class="controls">
          <button class="minus" data-change="-5">-5</button>
          <button class="minus" data-change="-1">-1</button>
          <button class="plus" data-change="1">+1</button>
          <button class="plus" data-change="5">+5</button>
        </div>
        <div class="commander-trackers"></div>
      </div>
    </div>
    <div class="section">
      <div class="life">40</div>
      <div class="player-area">
        <input class="player-name" placeholder="Player 3" />
        <div class="controls">
          <button class="minus" data-change="-5">-5</button>
          <button class="minus" data-change="-1">-1</button>
          <button class="plus" data-change="1">+1</button>
          <button class="plus" data-change="5">+5</button>
        </div>
        <div class="commander-trackers"></div>
      </div>
    </div>
    <div class="section">
      <div class="life">40</div>
      <div class="player-area">
        <input class="player-name" placeholder="Player 4" />
        <div class="controls">
          <button class="minus" data-change="-5">-5</button>
          <button class="minus" data-change="-1">-1</button>
          <button class="plus" data-change="1">+1</button>
          <button class="plus" data-change="5">+5</button>
        </div>
        <div class="commander-trackers"></div>
      </div>
    </div>
  </div>

  <div class="player-controls">
    <button class="add" id="addPlayer">+ Player</button>
    <button class="remove" id="removePlayer">- Player</button>
  </div>

  <div class="install-hint" id="installHint">Add to Home Screen for an app-like experience.</div>
  <div id="historyFeed">
    <div style="font-weight:800;font-size:.85rem;margin-bottom:8px;">Turn History</div>
    <div id="historyList">No turns logged yet.</div>
  </div>
</div>

<template id="playerTemplate">
  <div class="section">
    <div class="life">40</div>
    <div class="player-area">
      <input class="player-name" placeholder="Player" />
      <div class="controls">
        <button class="minus" data-change="-5">-5</button>
        <button class="minus" data-change="-1">-1</button>
        <button class="plus" data-change="1">+1</button>
        <button class="plus" data-change="5">+5</button>
      </div>
      <div class="commander-trackers"></div>
    </div>
  </div>
</template>

<script>
const app = document.getElementById('app');
const addBtn = document.getElementById('addPlayer');
const removeBtn = document.getElementById('removePlayer');
const resetBtn = document.getElementById('resetAll');
const pickStarterBtn = document.getElementById('pickStarter');
const endTurnBtn = document.getElementById('endTurnBtn');
const template = document.getElementById('playerTemplate');
const diceResult = document.getElementById('diceResult');
const installHint = document.getElementById('installHint');
const turnDisplay = document.getElementById('turnDisplay');
const historyList = document.getElementById('historyList');
const gameTimer = document.getElementById('gameTimer');
const presetSelect = document.getElementById('presetSelect');

let currentTurn = 1;
let gameSeconds = 0;
let timerInterval = null;

function vibrate(pattern) {
  if ('vibrate' in navigator) navigator.vibrate(pattern);
}

function animateLife(life, delta) {
  life.classList.remove('flash-plus', 'flash-minus');
  void life.offsetWidth;
  life.classList.add(delta >= 0 ? 'flash-plus' : 'flash-minus');
}

function animateLifeNumber(life, targetValue) {
  const startValue = Number(life.textContent);
  if (startValue === targetValue) {
    life.textContent = String(targetValue);
    return;
  }
  if (life._lifeAnimationFrame) cancelAnimationFrame(life._lifeAnimationFrame);

  const difference = targetValue - startValue;
  const duration = Math.min(260, Math.max(120, Math.abs(difference) * 22));
  const startTime = performance.now();

  function step(now) {
    const progress = Math.min((now - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    const currentValue = startValue + Math.round(difference * eased);
    life.textContent = String(currentValue);
    if (progress < 1) {
      life._lifeAnimationFrame = requestAnimationFrame(step);
    } else {
      life.textContent = String(targetValue);
      life._lifeAnimationFrame = null;
    }
  }

  life._lifeAnimationFrame = requestAnimationFrame(step);
}

function updateLife(life, delta) {
  const currentValue = Number(life.textContent);
  const nextValue = currentValue + delta;
  animateLifeNumber(life, nextValue);
  animateLife(life, delta);
  vibrate(Math.abs(delta) >= 5 ? [18, 12, 18] : 12);
}

function getDisplayName(section, index) {
  const input = section.querySelector('.player-name');
  return (input?.value || input?.placeholder || `Player ${index + 1}`).trim();
}

function commanderBoxHTML(label, value = 0) {
  const lethalClass = value >= 21 ? ' lethal' : '';
  return `<div class="cmd-box${lethalClass}" data-cmd data-label="${label}">
    <div class="cmd-label">${label}</div>
    <div class="cmd-row">
      <button type="button" class="cmd-btn" data-cmd-change="-1">-</button>
      <div class="cmd-value">${value}</div>
      <button type="button" class="cmd-btn" data-cmd-change="1">+</button>
    </div>
  </div>`;
}

function rebuildCommanderTrackers() {
  const sections = [...app.querySelectorAll('.section')];
  const names = sections.map((section, index) => getDisplayName(section, index));

  sections.forEach((section, sectionIndex) => {
    const wrap = section.querySelector('.commander-trackers');
    const previous = [...wrap.querySelectorAll('[data-cmd]')].map(box => ({
      label: box.dataset.label,
      value: Number(box.querySelector('.cmd-value')?.textContent || 0)
    }));

    const otherPlayers = names.filter((_, idx) => idx !== sectionIndex);
    wrap.innerHTML = otherPlayers.map(name => {
      const existing = previous.find(item => item.label === name);
      return commanderBoxHTML(name, existing ? existing.value : 0);
    }).join('');
  });
}

function createPlayerSection(playerNumber, lifeTotal) {
  const clone = template.content.cloneNode(true);
  const section = clone.querySelector('.section');
  const input = clone.querySelector('.player-name');
  const life = clone.querySelector('.life');
  input.placeholder = `Player ${playerNumber}`;
  life.textContent = String(lifeTotal);
  return section;
}

function applyPreset(preset) {
  const config = preset === 'standard'
    ? { players: 2, life: 20 }
    : { players: 4, life: 40 };

  app.innerHTML = '';
  for (let i = 1; i <= config.players; i += 1) {
    app.appendChild(createPlayerSection(i, config.life));
  }

  gameSeconds = 0;
  stopGameTimer();
  updateGameTimer();
  clearStarter();
  currentTurn = 1;
  updateTurnDisplay();
  historyList.textContent = 'No turns logged yet.';
  rebuildCommanderTrackers();
  showResult(`${preset === 'standard' ? 'Standard' : 'Commander'} preset loaded`);
}

function showResult(text) {
  diceResult.textContent = text;
  diceResult.classList.remove('flashy');
  void diceResult.offsetWidth;
  diceResult.classList.add('flashy');
  diceResult.textContent = text;
  setTimeout(() => {
    diceResult.classList.remove('flashy');
    diceResult.textContent = text;
  }, 600);
}

function clearStarter() {
  app.querySelectorAll('.section').forEach(section => section.classList.remove('starting-player'));
}

function updateTurnDisplay() {
  turnDisplay.textContent = `Turn ${currentTurn}`;
}

function updateGameTimer() {
  const minutes = String(Math.floor(gameSeconds / 60)).padStart(2, '0');
  const seconds = String(gameSeconds % 60).padStart(2, '0');
  gameTimer.textContent = `${minutes}:${seconds}`;
}

function startGameTimer() {
  if (timerInterval) return;
  timerInterval = setInterval(() => {
    gameSeconds += 1;
    updateGameTimer();
  }, 1000);
}

function stopGameTimer() {
  clearInterval(timerInterval);
  timerInterval = null;
}

function snapshotLifeTotals() {
  return [...app.querySelectorAll('.section')].map((section, index) => `${getDisplayName(section, index)}: ${section.querySelector('.life').textContent}`);
}

function addHistoryEntry() {
  const totals = snapshotLifeTotals();
  if (historyList.textContent.trim() === 'No turns logged yet.') historyList.innerHTML = '';
  const entry = document.createElement('div');
  entry.style.padding = '8px';
  entry.style.borderRadius = '10px';
  entry.style.background = '#111827';
  entry.style.border = '1px solid #374151';
  entry.innerHTML = `<div style="font-weight:800;margin-bottom:4px;">End of Turn ${currentTurn}</div><div>${totals.join(' • ')}</div>`;
  historyList.prepend(entry);
}

app.addEventListener('input', e => {
  if (e.target.closest('.player-name')) rebuildCommanderTrackers();
});

app.addEventListener('click', e => {
  const cmdBtn = e.target.closest('[data-cmd-change]');
  if (cmdBtn) {
    const box = cmdBtn.closest('[data-cmd]');
    const valueEl = box.querySelector('.cmd-value');
    const nextValue = Math.max(0, Number(valueEl.textContent) + Number(cmdBtn.dataset.cmdChange));
    valueEl.textContent = String(nextValue);
    box.classList.toggle('lethal', nextValue >= 21);
    vibrate(8);
    return;
  }

  const btn = e.target.closest('[data-change]');
  if (btn) {
    const section = btn.closest('.section');
    const life = section.querySelector('.life');
    updateLife(life, Number(btn.dataset.change));
    return;
  }

  const life = e.target.closest('.life');
  if (life) {
    updateLife(life, 1);
    life.classList.add('tap-hint');
    setTimeout(() => life.classList.remove('tap-hint'), 180);
  }
});

addBtn.onclick = () => {
  const clone = template.content.cloneNode(true);
  const input = clone.querySelector('.player-name');
  const life = clone.querySelector('.life');
  input.placeholder = `Player ${app.querySelectorAll('.section').length + 1}`;
  life.textContent = presetSelect.value === 'standard' ? '20' : '40';
  app.appendChild(clone);
  rebuildCommanderTrackers();
};

removeBtn.onclick = () => {
  const sections = app.querySelectorAll('.section');
  if (sections.length > 1) {
    sections[sections.length - 1].remove();
    rebuildCommanderTrackers();
  }
};

resetBtn.onclick = () => {
  gameSeconds = 0;
  stopGameTimer();
  updateGameTimer();
  app.querySelectorAll('.life').forEach(l => {
    if (l._lifeAnimationFrame) {
      cancelAnimationFrame(l._lifeAnimationFrame);
      l._lifeAnimationFrame = null;
    }
    l.textContent = '40';
    l.classList.remove('flash-plus', 'flash-minus');
  });
  app.querySelectorAll('.cmd-value').forEach(v => v.textContent = '0');
  app.querySelectorAll('[data-cmd]').forEach(box => box.classList.remove('lethal'));
  clearStarter();
  currentTurn = 1;
  updateTurnDisplay();
  historyList.textContent = 'No turns logged yet.';
  showResult('All life totals and commander damage reset');
  vibrate([12, 18, 12]);
};

pickStarterBtn.onclick = () => {
  startGameTimer();
  const sections = [...app.querySelectorAll('.section')];
  if (!sections.length) return;
  clearStarter();
  const index = Math.floor(Math.random() * sections.length);
  const starter = sections[index];
  starter.classList.add('starting-player');
  showResult(`Starting Player: ${getDisplayName(starter, index)}`);
  vibrate([20, 30, 20]);
};

endTurnBtn.onclick = () => {
  addHistoryEntry();
  currentTurn += 1;
  updateTurnDisplay();
  showResult(`Turn ${currentTurn}`);
  vibrate([10, 20, 10]);
};

document.querySelector('.dice-toolbar').onclick = e => {
  const btn = e.target.closest('.toolbar-btn');
  if (!btn) return;
  btn.classList.remove('rolling');
  void btn.offsetWidth;
  btn.classList.add('rolling');

  setTimeout(() => {
    if (btn.dataset.flip === 'coin') {
      const result = Math.random() < 0.5 ? 'Heads' : 'Tails';
      showResult(`Coin Flip: ${result}`);
      vibrate([15, 20, 15]);
      return;
    }
    if (btn.dataset.die) {
      const sides = Number(btn.dataset.die);
      const roll = Math.floor(Math.random() * sides) + 1;
      showResult(`D${sides}: ${roll}`);
      vibrate(20);
    }
  }, 180);
};

let startY = 0;
let activeLife = null;
app.addEventListener('touchstart', e => {
  const life = e.target.closest('.life');
  if (!life) return;
  activeLife = life;
  startY = e.touches[0].clientY;
}, { passive: true });

app.addEventListener('touchend', e => {
  if (!activeLife) return;
  const endY = e.changedTouches[0].clientY;
  const deltaY = endY - startY;
  if (deltaY > 24) updateLife(activeLife, -1);
  activeLife = null;
}, { passive: true });

let holdTimer = null;
let repeatTimer = null;
app.addEventListener('pointerdown', e => {
  const btn = e.target.closest('[data-change]');
  if (!btn) return;
  const section = btn.closest('.section');
  const life = section.querySelector('.life');
  const delta = Number(btn.dataset.change);
  holdTimer = setTimeout(() => {
    repeatTimer = setInterval(() => updateLife(life, delta), 120);
  }, 350);
});

function clearHold() {
  clearTimeout(holdTimer);
  clearInterval(repeatTimer);
}
window.addEventListener('pointerup', clearHold);
window.addEventListener('pointercancel', clearHold);
window.addEventListener('pointerleave', clearHold);
