<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Life Counter</title>
  <style>
    :root {
      --bg: #e9e9ee;
      --panel: #f7f7fb;
      --border: #121212;
      --shadow: rgba(0, 0, 0, 0.18);
      --gold: #e9be3a;
      --red: #f04356;
      --purple: #d7a7f1;
      --blue: #4e57f0;
      --text-dark: #111;
      --text-light: #fff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #efeff4 0%, #ddddE5 100%);
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text-dark);
      padding: 24px;
    }

    .app {
      width: min(96vw, 430px);
    }

    .header {
      text-align: center;
      margin-bottom: 14px;
      line-height: 1.1;
    }

    .header h1 {
      margin: 0;
      font-size: 1.15rem;
      font-weight: 800;
      letter-spacing: 0.03em;
    }

    .header p {
      margin: 4px 0 0;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    .board-wrap {
      position: relative;
      aspect-ratio: 1 / 1;
      border-radius: 14px;
      padding: 10px;
      background: transparent;
    }

    .board {
      position: relative;
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 6px;
      background: var(--border);
      padding: 6px;
      border-radius: 14px;
      box-shadow: 0 10px 24px var(--shadow);
      overflow: hidden;
    }

    .player {
      border: 0;
      border-radius: 8px;
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
      transition: transform 120ms ease, filter 120ms ease;
    }

    .player:active {
      transform: scale(0.992);
      filter: brightness(0.97);
    }

    .player::before,
    .player::after {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: clamp(1rem, 2vw, 1.1rem);
      opacity: 0.6;
      font-weight: 700;
    }

    .player::before { content: '+'; top: 10px; }
    .player::after { content: '−'; bottom: 10px; }

    .life {
      font-size: clamp(2.4rem, 10vw, 4rem);
      font-weight: 800;
      line-height: 1;
      letter-spacing: 0.02em;
      pointer-events: none;
    }

    .p1 {
      background: var(--gold);
      color: var(--text-dark);
      transform: rotate(90deg);
    }

    .p2 {
      background: var(--red);
      color: var(--text-dark);
      transform: rotate(-90deg);
    }

    .p3 {
      background: var(--purple);
      color: var(--text-dark);
      transform: rotate(90deg);
    }

    .p4 {
      background: var(--blue);
      color: var(--text-dark);
      transform: rotate(-90deg);
    }

    .center {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 22px;
      height: 22px;
      border-radius: 999px;
      background: #2a2a2a;
      border: 2px solid #111;
      display: grid;
      place-items: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.25);
      z-index: 5;
    }

    .center::after {
      content: '';
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: #9c9c9c;
      border: 1px solid #1a1a1a;
    }

    .controls {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .controls button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      font-size: 0.95rem;
      font-weight: 700;
      background: #1d1d1f;
      color: #fff;
      cursor: pointer;
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .controls button.secondary {
      background: #fff;
      color: #111;
      border: 1px solid #cfcfd7;
    }

    .instructions {
      margin-top: 14px;
      text-align: center;
      font-size: 0.85rem;
      opacity: 0.7;
    }

    @media (max-width: 480px) {
      .app { width: 100%; }
      .board-wrap { padding: 0; }
      .header h1 { font-size: 1rem; }
      .header p { font-size: 0.72rem; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>Life Counter</h1>
      <p>Tap top half to add 1, bottom half to subtract 1</p>
    </div>

    <div class="board-wrap">
      <div class="board" id="board">
        <button class="player p1" data-player="0" aria-label="Player 1 life total">
          <span class="life">40</span>
        </button>
        <button class="player p2" data-player="1" aria-label="Player 2 life total">
          <span class="life">40</span>
        </button>
        <button class="player p3" data-player="2" aria-label="Player 3 life total">
          <span class="life">40</span>
        </button>
        <button class="player p4" data-player="3" aria-label="Player 4 life total">
          <span class="life">40</span>
        </button>
      </div>
      <div class="center" aria-hidden="true"></div>
    </div>

    <div class="controls">
      <button id="reset40">Reset to 40</button>
      <button id="reset20" class="secondary">Reset to 20</button>
    </div>

    <div class="instructions">
      Commander-style 4 player layout inspired by your reference image.
    </div>
  </div>

  <script>
    const startingLife = 40;
    let lives = [40, 40, 40, 40];
    const players = [...document.querySelectorAll('.player')];

    function render() {
      players.forEach((player, i) => {
        player.querySelector('.life').textContent = lives[i];
      });
    }

    function setAll(value) {
      lives = [value, value, value, value];
      render();
    }

    players.forEach((player, index) => {
      player.addEventListener('click', (event) => {
        const rect = player.getBoundingClientRect();
        const isTopHalf = (event.clientY - rect.top) < rect.height / 2;
        lives[index] += isTopHalf ? 1 : -1;
        render();
      });

      player.addEventListener('contextmenu', (event) => event.preventDefault());

      let pressTimer;
      player.addEventListener('pointerdown', (event) => {
        if (event.pointerType !== 'touch') return;
        pressTimer = setTimeout(() => {
          lives[index] = startingLife;
          render();
          navigator.vibrate?.(20);
        }, 700);
      });

      ['pointerup', 'pointerleave', 'pointercancel'].forEach(type => {
        player.addEventListener(type, () => clearTimeout(pressTimer));
      });
    });

    document.getElementById('reset40').addEventListener('click', () => setAll(40));
    document.getElementById('reset20').addEventListener('click', () => setAll(20));

    render();
  </script>
</body>
</html>
