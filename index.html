<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Cabal Counter</title>
<meta name="theme-color" content="#111315" />
<link rel="manifest" href="#" id="manifestLink" />
<style>
:root{
  --bg:#111315;
  --card:#ffffff;
  --card-edge:#e5e7eb;
  --text:#111827;
  --muted:#6b7280;

  --primary:#3b82f6;
  --primary-dark:#2563eb;
  --danger:#111111;
  --success:#16a34a;
  --warning:#f59e0b;

  --life-bg:#f3f4f6;
  --life-border:#111111;

  --radius:18px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  margin:0;
  min-height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}
body{padding:12px 12px max(18px,env(safe-area-inset-bottom));}
.shell{max-width:560px;margin:0 auto;}

.topbar{
  position:sticky;
  top:0;
  z-index:10;
  background:#1f2937;
  border:1px solid #374151;
  box-shadow:0 8px 20px rgba(0,0,0,0.35);
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
}
.title-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:8px;}
.title-row h1{margin:0;font-size:1.1rem;color:#f9fafb;}
.header-actions{display:flex;gap:6px;}
.reset-btn,.first-player-btn{
  border:none;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:8px 10px;
  border-radius:10px;
  font-weight:700;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  font-size:.82rem;
}
.first-player-btn{background:linear-gradient(180deg,var(--warning),#d97706);}

.dice-toolbar{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.toolbar-btn{
  border:none;
  background:linear-gradient(180deg,var(--primary),var(--primary-dark));
  color:#fff;
  padding:8px 0;
  border-radius:10px;
  font-weight:700;
  box-shadow:0 4px 10px rgba(0,0,0,0.3);
  transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
}
.toolbar-btn:active{transform:scale(.96);}
.toolbar-btn.rolling{animation:rollPulse .45s ease;}

.dice-result{
  text-align:center;
  margin-top:8px;
  font-size:1.1rem;
  font-weight:900;
  letter-spacing:.04em;
  color:#111827;
  background:#e5e7eb;
  border:1px solid #d1d5db;
  border-radius:12px;
  padding:10px 8px;
  box-shadow:0 4px 10px rgba(0,0,0,0.2);
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
  transition:transform .2s ease, box-shadow .2s ease;
}
.dice-result.active{
  transform:scale(1.03);
  box-shadow:0 8px 18px rgba(0,0,0,0.28);
}

.app{display:flex;flex-direction:column;gap:8px;}
.section{
  background:var(--card);
  border:1px solid var(--card-edge);
  box-shadow:0 6px 14px rgba(0,0,0,0.15);
  border-radius:var(--radius);
  padding:6px 8px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section:nth-child(4n+1){border-left:4px solid #ef4444;}
.section:nth-child(4n+2){border-left:4px solid #3b82f6;}
.section:nth-child(4n+3){border-left:4px solid #22c55e;}
.section:nth-child(4n+4){border-left:4px solid #f59e0b;}
.section.starting-player{
  outline:3px solid var(--warning);
  box-shadow:0 0 0 4px rgba(245,158,11,.2), 0 10px 18px rgba(0,0,0,0.22);
}

.life{
  font-size:1.9rem;
  font-weight:900;
  min-width:60px;
  text-align:center;
  color:#111827;
  background:var(--life-bg);
  border:2px solid var(--life-border);
  border-radius:12px;
  padding:4px 8px;
  box-shadow:0 3px 8px rgba(0,0,0,0.2);
  user-select:none;
  touch-action:pan-y;
  transition:transform .18s ease, background-color .18s ease, box-shadow .18s ease;
}
.life.flash-plus{animation:lifePlus .35s ease;}
.life.flash-minus{animation:lifeMinus .35s ease;}
.life.tap-hint{box-shadow:0 0 0 3px rgba(59,130,246,.2), 0 3px 8px rgba(0,0,0,0.2);}

.player-area{flex:1;display:flex;flex-direction:column;gap:4px;min-width:0;}
.player-name{
  font-size:.65rem;
  font-weight:700;
  padding:2px 4px;
  border-radius:6px;
  border:1px solid #d1d5db;
  background:#fff;
  color:#444;
}
.controls{display:flex;gap:4px;}
.controls button{
  flex:1;
  border:1.5px solid #000000;
  border-radius:8px;
  padding:6px 0;
  font-size:.75rem;
  font-weight:800;
  color:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.14);
  transition:transform .12s ease, box-shadow .12s ease, filter .12s ease;
}
.controls button:active{transform:translateY(1px) scale(.98);box-shadow:0 2px 6px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.1);}
.minus{background:var(--danger);color:#ffffff;}
.plus{background:linear-gradient(180deg,var(--primary),var(--primary-dark));}

.commander-trackers{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:4px;
}
.cmd-box{
  border:1px solid #d1d5db;
  border-radius:8px;
  background:#f9fafb;
  padding:3px;
  min-width:0;
}
.cmd-label{
  font-size:.52rem;
  color:var(--muted);
  text-align:center;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  margin-bottom:2px;
}
.cmd-row{display:flex;align-items:center;gap:2px;}
.cmd-btn{
  flex:0 0 18px;
  height:18px;
  border:1px solid #cbd5e1;
  border-radius:5px;
  background:#fff;
  color:#111827;
  font-size:.7rem;
  font-weight:800;
  padding:0;
}
.cmd-value{
  flex:1;
  min-width:0;
  text-align:center;
  font-size:.72rem;
  font-weight:800;
  color:#111827;
}
.cmd-box.lethal{
  background:#fee2e2;
  border-color:#ef4444;
}

.player-controls{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px;}
.player-controls button{
  border:none;
  padding:10px 0;
  border-radius:12px;
  font-weight:700;
  color:#fff;
  box-shadow:0 6px 14px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.16);
}
.add{background:linear-gradient(180deg,var(--primary),var(--primary-dark));}
.remove{background:#374151;}

.install-hint{
  margin-top:8px;
  color:#d1d5db;
  font-size:.72rem;
  text-align:center;
}

@keyframes rollPulse{
  0%{transform:scale(1) rotate(0deg)}
  20%{transform:scale(.95) rotate(-4deg)}
  50%{transform:scale(1.06) rotate(4deg)}
  100%{transform:scale(1) rotate(0deg)}
}
@keyframes lifePlus{
  0%{transform:scale(1);background:#f3f4f6}
  40%{transform:scale(1.08);background:#dcfce7}
  100%{transform:scale(1);background:#f3f4f6}
}
@keyframes lifeMinus{
  0%{transform:scale(1);background:#f3f4f6}
  40%{transform:scale(1.08);background:#fee2e2}
  100%{transform:scale(1);background:#f3f4f6}
}
</style>
</head>
<body>
<div class="shell">
<div class="topbar">
<div class="title-row">
<h1>Cabal Counter</h1>
<div class="header-actions">
<button class="first-player-btn" id="pickStarter">First Player</button>
<button class="reset-btn" id="resetAll">Reset</button>
</div>
</div>
<div class="dice-toolbar">
<button class="toolbar-btn" data-die="6">D6</button>
<button class="toolbar-btn" data-die="10">D10</button>
<button class="toolbar-btn" data-die="12">D12</button>
<button class="toolbar-btn" data-die="20">D20</button>
<button class="toolbar-btn" data-flip="coin">Coin</button>
</div>
<div class="dice-result" id="diceResult">Roll a die, flip a coin, or pick the starting player</div>
<div class="install-hint" id="installHint">Add to Home Screen for an app-like experience.</div>
</div>

<div class="app" id="app">
<div class="section">
<div class="life">40</div>
<div class="player-area">
<input class="player-name" placeholder="Player 1" />
<div class="controls">
<button class="minus" data-change="-5">-5</button>
<button class="minus" data-change="-1">-1</button>
<button class="plus" data-change="1">+1</button>
<button class="plus" data-change="5">+5</button>
</div>
<div class="commander-trackers"></div>
</div>
</div>
<div class="section">
<div class="life">40</div>
<div class="player-area">
<input class="player-name" placeholder="Player 2" />
<div class="controls">
<button class="minus" data-change="-5">-5</button>
<button class="minus" data-change="-1">-1</button>
<button class="plus" data-change="1">+1</button>
<button class="plus" data-change="5">+5</button>
</div>
<div class="commander-trackers"></div>
</div>
</div>
<div class="section">
<div class="life">40</div>
<div class="player-area">
<input class="player-name" placeholder="Player 3" />
<div class="controls">
<button class="minus" data-change="-5">-5</button>
<button class="minus" data-change="-1">-1</button>
<button class="plus" data-change="1">+1</button>
<button class="plus" data-change="5">+5</button>
</div>
<div class="commander-trackers"></div>
</div>
</div>
<div class="section">
<div class="life">40</div>
<div class="player-area">
<input class="player-name" placeholder="Player 4" />
<div class="controls">
<button class="minus" data-change="-5">-5</button>
<button class="minus" data-change="-1">-1</button>
<button class="plus" data-change="1">+1</button>
<button class="plus" data-change="5">+5</button>
</div>
<div class="commander-trackers"></div>
</div>
</div>
</div>

<div class="player-controls">
<button class="add" id="addPlayer">+ Player</button>
<button class="remove" id="removePlayer">- Player</button>
</div>
</div>

<template id="playerTemplate">
<div class="section">
<div class="life">40</div>
<div class="player-area">
<input class="player-name" placeholder="Player" />
<div class="controls">
<button class="minus" data-change="-5">-5</button>
<button class="minus" data-change="-1">-1</button>
<button class="plus" data-change="1">+1</button>
<button class="plus" data-change="5">+5</button>
</div>
<div class="commander-trackers"></div>
</div>
</div>
</template>

<script>
const app=document.getElementById('app')
const addBtn=document.getElementById('addPlayer')
const removeBtn=document.getElementById('removePlayer')
const resetBtn=document.getElementById('resetAll')
const pickStarterBtn=document.getElementById('pickStarter')
const template=document.getElementById('playerTemplate')
const diceResult=document.getElementById('diceResult')
const installHint=document.getElementById('installHint')

function animateLife(life, delta){
  life.classList.remove('flash-plus','flash-minus')
  void life.offsetWidth
  life.classList.add(delta >= 0 ? 'flash-plus' : 'flash-minus')
}

function updateLife(life, delta){
  life.textContent=Number(life.textContent)+delta
  animateLife(life, delta)
}

function getDisplayName(section, index){
  const input=section.querySelector('.player-name')
  return (input?.value || input?.placeholder || `Player ${index+1}`).trim()
}

function commanderBoxHTML(label){
  return `<div class="cmd-box" data-cmd>
    <div class="cmd-label">${label}</div>
    <div class="cmd-row">
      <button type="button" class="cmd-btn" data-cmd-change="-1">-</button>
      <div class="cmd-value">0</div>
      <button type="button" class="cmd-btn" data-cmd-change="1">+</button>
    </div>
  </div>`
}

function rebuildCommanderTrackers(){
  const sections=[...app.querySelectorAll('.section')]
  const names=sections.map((section,index)=>getDisplayName(section,index))
  sections.forEach((section,sectionIndex)=>{
    const wrap=section.querySelector('.commander-trackers')
    const previous=[...wrap.querySelectorAll('[data-cmd]')].map(box=>Number(box.querySelector('.cmd-value').textContent)||0)
    const labels=names.map((name,idx)=> idx===sectionIndex ? 'Self' : name)
    wrap.innerHTML=labels.map(commanderBoxHTML).join('')
    ;[...wrap.querySelectorAll('[data-cmd]')].forEach((box,idx)=>{
      const valueEl=box.querySelector('.cmd-value')
      valueEl.textContent=previous[idx] ?? 0
      box.classList.toggle('lethal', Number(valueEl.textContent) >= 21)
    })
  })
}

function showResult(text){
  diceResult.textContent=text
  diceResult.classList.remove('active')
  void diceResult.offsetWidth
  diceResult.classList.add('active')
  setTimeout(()=>diceResult.classList.remove('active'),250)
}

function clearStarter(){
  app.querySelectorAll('.section').forEach(section=>section.classList.remove('starting-player'))
}

app.addEventListener('input',e=>{
  if(e.target.closest('.player-name')) rebuildCommanderTrackers()
})

app.addEventListener('click',e=>{
  const cmdBtn=e.target.closest('[data-cmd-change]')
  if(cmdBtn){
    const box=cmdBtn.closest('[data-cmd]')
    const valueEl=box.querySelector('.cmd-value')
    const nextValue=Math.max(0, Number(valueEl.textContent)+Number(cmdBtn.dataset.cmdChange))
    valueEl.textContent=nextValue
    box.classList.toggle('lethal', nextValue >= 21)
    return
  }

  const btn=e.target.closest('[data-change]')
  if(btn){
    const section=btn.closest('.section')
    const life=section.querySelector('.life')
    updateLife(life, Number(btn.dataset.change))
    return
  }

  const life=e.target.closest('.life')
  if(life){
    updateLife(life, 1)
    life.classList.add('tap-hint')
    setTimeout(()=>life.classList.remove('tap-hint'),180)
  }
})

addBtn.onclick=()=>{
  const clone=template.content.cloneNode(true)
  const input=clone.querySelector('.player-name')
  input.placeholder=`Player ${app.querySelectorAll('.section').length+1}`
  app.appendChild(clone)
  rebuildCommanderTrackers()
}

removeBtn.onclick=()=>{
  const sections=app.querySelectorAll('.section')
  if(sections.length>1){
    sections[sections.length-1].remove()
    rebuildCommanderTrackers()
  }
}

resetBtn.onclick=()=>{
  app.querySelectorAll('.life').forEach(l=>{
    l.textContent=40
    l.classList.remove('flash-plus','flash-minus')
  })
  app.querySelectorAll('.cmd-value').forEach(v=>v.textContent=0)
  app.querySelectorAll('[data-cmd]').forEach(box=>box.classList.remove('lethal'))
  clearStarter()
  showResult('All life totals and commander damage reset')
}

pickStarterBtn.onclick=()=>{
  const sections=[...app.querySelectorAll('.section')]
  if(!sections.length) return
  clearStarter()
  const index=Math.floor(Math.random()*sections.length)
  const starter=sections[index]
  starter.classList.add('starting-player')
  showResult(`Starting Player: ${getDisplayName(starter,index)}`)
}

document.querySelector('.dice-toolbar').onclick=e=>{
  const btn=e.target.closest('.toolbar-btn')
  if(!btn)return
  btn.classList.remove('rolling')
  void btn.offsetWidth
  btn.classList.add('rolling')

  setTimeout(()=>{
    if(btn.dataset.flip==='coin'){
      const result=Math.random()<0.5?'Heads':'Tails'
      showResult(`Coin Flip: ${result}`)
      return
    }
    if(btn.dataset.die){
      const sides=Number(btn.dataset.die)
      const roll=Math.floor(Math.random()*sides)+1
      showResult(`D${sides}: ${roll}`)
    }
  },180)
}

let startY=0
let activeLife=null
app.addEventListener('touchstart',e=>{
  const life=e.target.closest('.life')
  if(!life) return
  activeLife=life
  startY=e.touches[0].clientY
},{passive:true})

app.addEventListener('touchend',e=>{
  if(!activeLife) return
  const endY=e.changedTouches[0].clientY
  const deltaY=endY-startY
  if(deltaY>24){
    updateLife(activeLife, -1)
  }
  activeLife=null
},{passive:true})

let holdTimer=null
let repeatTimer=null
app.addEventListener('pointerdown',e=>{
  const btn=e.target.closest('[data-change]')
  if(!btn) return
  const section=btn.closest('.section')
  const life=section.querySelector('.life')
  const delta=Number(btn.dataset.change)
  holdTimer=setTimeout(()=>{
    repeatTimer=setInterval(()=>updateLife(life, delta),120)
  },350)
})

function clearHold(){
  clearTimeout(holdTimer)
  clearInterval(repeatTimer)
}
window.addEventListener('pointerup',clearHold)
window.addEventListener('pointercancel',clearHold)
window.addEventListener('pointerleave',clearHold)

// Lightweight in-file PWA support
const manifest={
  name:'Cabal Counter',
  short_name:'Cabal Counter',
  start_url:'.',
  display:'standalone',
  background_color:'#111315',
  theme_color:'#111315',
  icons:[
    {src:'data:image/svg+xml;base64,'+btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><rect width="192" height="192" rx="36" fill="#111315"/><circle cx="96" cy="96" r="54" fill="#3b82f6"/><text x="96" y="111" text-anchor="middle" font-size="72" font-family="Arial" fill="white" font-weight="700">C</text></svg>`), sizes:'192x192', type:'image/svg+xml'},
    {src:'data:image/svg+xml;base64,'+btoa(`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><rect width="512" height="512" rx="96" fill="#111315"/><circle cx="256" cy="256" r="146" fill="#3b82f6"/><text x="256" y="298" text-anchor="middle" font-size="210" font-family="Arial" fill="white" font-weight="700">C</text></svg>`), sizes:'512x512', type:'image/svg+xml'}
  ]
}
const manifestBlob=new Blob([JSON.stringify(manifest)],{type:'application/json'})
document.getElementById('manifestLink').href=URL.createObjectURL(manifestBlob)
if('serviceWorker' in navigator){
  const swCode=`self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',()=>{});`
  const swBlob=new Blob([swCode],{type:'text/javascript'})
  navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(()=>{})
}

let deferredPrompt=null
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault()
  deferredPrompt=e
  installHint.textContent='This app can be installed. Use your browser menu or install prompt.'
})
window.addEventListener('appinstalled',()=>{
  installHint.textContent='Cabal Counter installed successfully.'
})

rebuildCommanderTrackers()
</script>
</body>
</html>
