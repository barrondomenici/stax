<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Cafe Counter</title>
<style>
:root{
  --cream:#eee6d8;
  --sand:#d7c2a8;
  --tan:#b17b4e;
  --tan-light:#c89061;
  --brown:#8a5a37;
  --brown-mid:#6f472b;
  --dark-brown:#4b2f1c;
  --black:#000000;

  --bg:#000000;
  --card:#fffdf9;
  --card-edge:#eadfce;
  --text:#1a1a1a;
  --muted:#8a7b6d;

  --radius:18px;
}

*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

html,body{
  margin:0;
  min-height:100%;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
  background:#000;
  color:var(--text);
  overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
}

body{
  padding:12px 12px max(18px,env(safe-area-inset-bottom));
}

.shell{
  max-width:560px;
  margin:0 auto;
}

/* TOP BAR */
.topbar{
  position:sticky;
  top:0;
  z-index:10;
  background:linear-gradient(180deg,#2a1a10,#1c120b);
  border:1px solid rgba(255,255,255,0.08);
  box-shadow:0 10px 24px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.04);
  border-radius:16px;
  padding:12px;
  margin-bottom:12px;
}

.title-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:10px;
}

.title-row h1{
  margin:0;
  font-size:1.1rem;
  color:var(--cream);
}

.reset-btn{
  border:none;
  background:linear-gradient(180deg,var(--tan-light),var(--brown));
  color:#fff;
  padding:8px 12px;
  border-radius:10px;
  font-weight:700;
  box-shadow:0 5px 12px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.18);
}

/* DICE */
.dice-toolbar{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:6px;
}

.toolbar-btn{
  border:none;
  background:linear-gradient(180deg,var(--tan-light),var(--brown));
  color:#fff;
  padding:8px 0;
  border-radius:10px;
  font-weight:700;
  box-shadow:0 5px 12px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.18);
}

.dice-result{
  text-align:center;
  margin-top:6px;
  font-size:.8rem;
  color:var(--cream);
}

/* PLAYER GRID */
.app{
  display:flex;
  flex-direction:column;
  gap:8px;
}

.section{
  background:linear-gradient(180deg,#ffffff,#f8f1e8);
  border:1px solid var(--card-edge);
  box-shadow:0 10px 24px rgba(0,0,0,0.18), inset 0 1px 0 rgba(255,255,255,0.95);
  border-radius:var(--radius);
  padding:6px 8px;
  display:flex;
  align-items:center;
  gap:8px;
}

.life{
  font-size:1.9rem;
  font-weight:900;
  min-width:60px;
  text-align:center;
  color:var(--brown-mid);
  background:linear-gradient(180deg,#fffaf2,#efe0cd);
  border:2px solid #000000;
  border-radius:12px;
  padding:4px 8px;
  box-shadow:0 6px 14px rgba(0,0,0,0.12), inset 0 1px 0 rgba(255,255,255,0.95);
  text-shadow:0 1px 0 rgba(255,255,255,0.6);
}

.player-area{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:3px;
}

.player-name{
  font-size:.65rem;
  font-weight:700;
  padding:2px 4px;
  border-radius:6px;
  border:1px solid #e4d2bb;
  background:#fff;
  color:#444;
}

.controls{
  display:flex;
  gap:4px;
}

.controls button{
  flex:1;
  border:none;
  border-radius:8px;
  padding:6px 0;
  font-size:.75rem;
  font-weight:800;
  color:#fff;
  box-shadow:0 4px 10px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.14);
}

.minus{background:linear-gradient(180deg,#6b4a30,var(--dark-brown));}
.plus{background:linear-gradient(180deg,var(--tan-light),var(--brown));}

/* PLAYER ADD/REMOVE */
.player-controls{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:12px;
}

.player-controls button{
  border:none;
  padding:10px 0;
  border-radius:12px;
  font-weight:700;
  color:#fff;
  box-shadow:0 6px 14px rgba(0,0,0,0.24), inset 0 1px 0 rgba(255,255,255,0.16);
}

.add{background:linear-gradient(180deg,var(--tan-light),var(--brown));}
.remove{background:linear-gradient(180deg,#6b4a30,var(--dark-brown));}

</style>
</head>
<body>

<div class="shell">

<div class="topbar">

<div class="title-row">
<h1>Cafe Counter</h1>
<button class="reset-btn" id="resetAll">Reset</button>
</div>

<div class="dice-toolbar">
<button class="toolbar-btn" data-die="6">D6</button>
<button class="toolbar-btn" data-die="10">D10</button>
<button class="toolbar-btn" data-die="12">D12</button>
<button class="toolbar-btn" data-die="20">D20</button>
</div>

<div class="dice-result" id="diceResult">Roll a die</div>

</div>

<div class="app" id="app">

<div class="section">
<div class="life">40</div>
<div class="player-area">
<input class="player-name" placeholder="Player" />
<div class="controls">
<button class="minus" data-change="-5">-5</button>
<button class="minus" data-change="-1">-1</button>
<button class="plus" data-change="1">+1</button>
<button class="plus" data-change="5">+5</button>
</div>
</div>
</div>

</div>

<div class="player-controls">
<button class="add" id="addPlayer">+ Player</button>
<button class="remove" id="removePlayer">- Player</button>
</div>

</div>

<template id="playerTemplate">
<div class="section">
<div class="life">40</div>
<div class="player-area">
<input class="player-name" placeholder="Player" />
<div class="controls">
<button class="minus" data-change="-5">-5</button>
<button class="minus" data-change="-1">-1</button>
<button class="plus" data-change="1">+1</button>
<button class="plus" data-change="5">+5</button>
</div>
</div>
</div>
</template>

<script>
const app=document.getElementById('app')
const addBtn=document.getElementById('addPlayer')
const removeBtn=document.getElementById('removePlayer')
const resetBtn=document.getElementById('resetAll')
const template=document.getElementById('playerTemplate')
const diceResult=document.getElementById('diceResult')

app.addEventListener('click',e=>{
const btn=e.target.closest('[data-change]')
if(!btn)return
const section=btn.closest('.section')
const life=section.querySelector('.life')
life.textContent=Number(life.textContent)+Number(btn.dataset.change)
})

addBtn.onclick=()=>{
const clone=template.content.cloneNode(true)
app.appendChild(clone)
}

removeBtn.onclick=()=>{
const sections=app.querySelectorAll('.section')
if(sections.length>1)sections[sections.length-1].remove()
}

resetBtn.onclick=()=>{
app.querySelectorAll('.life').forEach(l=>l.textContent=40)
}

/* dice */
document.querySelector('.dice-toolbar').onclick=e=>{
const btn=e.target.closest('[data-die]')
if(!btn)return
const sides=Number(btn.dataset.die)
const roll=Math.floor(Math.random()*sides)+1
 diceResult.textContent=`D${sides}: ${roll}`
}
</script>

</body>
</html>
